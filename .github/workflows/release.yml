name: Build GUI binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            artifact: parse-pdf-gui-macos-arm64.zip
            kind: mac
          - os: macos-13
            label: macos-x86_64
            artifact: parse-pdf-gui-macos-x86_64.zip
            kind: mac
          - os: ubuntu-22.04
            label: linux-x86_64
            artifact: parse-pdf-gui-linux-x86_64.tar.gz
            kind: linux
          - os: windows-latest
            label: windows-x86_64
            artifact: parse-pdf-gui-windows-x86_64.zip
            kind: win

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,vision]" pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller packaging/parse_pdf_gui.spec --clean --noconfirm

      # ----- Package per platform ---------------------------------------
      - name: Package (macOS)
        if: matrix.kind == 'mac'
        shell: bash
        run: |
          cd dist
          zip -r "../${{ matrix.artifact }}" "parse-pdf-gui.app"

      - name: Package (Linux)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          cd dist
          tar -czf "../${{ matrix.artifact }}" "parse-pdf-gui"

      - name: Package (Windows)
        if: matrix.kind == 'win'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/parse-pdf-gui.exe" -DestinationPath "${{ matrix.artifact }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
